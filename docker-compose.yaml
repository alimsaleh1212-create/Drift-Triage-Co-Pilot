# docker-compose.yaml — Drift Triage Co-Pilot stack (MLflow + services only)
#
# Postgres, Redis, pgAdmin run in shared infra at ~/infra/
# Start infra first:  docker compose -f ~/infra/docker-compose.yml up -d
#
# Services:
#   mlflow      — MLflow tracking server (Postgres backend, local artifact store).
#   service     — FastAPI model service (predict, drift, promotion).
#   agent       — FastAPI agent service (webhook, HIL, investigations).
#   worker      — arq async worker (replay_test, retrain, rollback).
#   dashboard   — Streamlit dashboard.
#
# Quick start:
#   docker compose -f ~/infra/docker-compose.yml up -d
#   cp .env.example .env  # fill GOOGLE_API_KEY, POSTGRES_PASSWORD, PROMOTION_API_KEY
#   make train            # register model, write artifacts/
#   docker compose up -d

services:

  # ─── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: dt_mlflow
    restart: unless-stopped
    network_mode: host
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-drift_triage}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB:-drift_triage}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    command: >
      sh -c "pip install -q psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-drift_triage}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB:-drift_triage}
      --default-artifact-root /mlflow/artifacts
      --host 127.0.0.1
      --port 5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Model service ────────────────────────────────────────────────────────
  service:
    build:
      context: ./backend
      target: service
    container_name: dt_service
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
      AGENT_URL: http://agent:8001
    ports:
      - "8000:8000"
    networks:
      - dt_network
    volumes:
      - ./backend/artifacts:/app/artifacts:ro
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Agent service ────────────────────────────────────────────────────────
  agent:
    build:
      context: ./backend
      target: agent
    container_name: dt_agent
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
    ports:
      - "8001:8001"
    networks:
      - dt_network
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── arq worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      target: worker
    container_name: dt_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
    networks:
      - dt_network
    volumes:
      - ./backend/artifacts:/app/artifacts

  # ─── Streamlit dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
    container_name: dt_dashboard
    restart: unless-stopped
    environment:
      SERVICE_URL: http://service:8000
      AGENT_URL: http://agent:8001
    ports:
      - "8501:8501"
    networks:
      - dt_network
    depends_on:
      service:
        condition: service_healthy
      agent:
        condition: service_healthy

networks:
  dt_network:
    driver: bridge

volumes:
  mlflow_data: