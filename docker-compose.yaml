# docker-compose.yaml — Drift Triage Co-Pilot — self-contained stack
#
# Two modes:
#
#   Fresh machine (no shared infra running):
#     make up-full        →  docker compose --profile infra up -d
#                            starts postgres + redis + pgadmin + all app services
#
#   Shared infra already running (postgres/redis from ~/infra or another project):
#     make up             →  docker compose up -d
#                            starts mlflow + app services only, joins existing postgres/redis
#
# Postgres/redis/pgadmin carry profiles: [infra] — skipped by default compose up.
# When infra is running, app service depends_on resolves against existing containers.
# dev_network is declared external — created by make up/up-full if missing.
#
# Ports:
#   5432 — Postgres   5000 — MLflow    8000 — Model service
#   6379 — Redis      8888 — pgAdmin   8001 — Agent
#   8501 — Dashboard

services:

  # ─── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  # profile: infra — only started by make up-full / docker compose --profile infra up
  # Same container name + volume as ~/infra — shared across projects.
  postgres:
    profiles: ["infra"]
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────────────────
  # profile: infra — same logic as postgres above.
  redis:
    profiles: ["infra"]
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── pgAdmin 4 ───────────────────────────────────────────────────────────
  # profile: infra — optional DB UI at http://localhost:8888
  pgadmin:
    profiles: ["infra"]
    image: dpage/pgadmin4:8.13
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dev.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme}
    ports:
      - "8888:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dev_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── MLflow tracking server ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: dt_mlflow
    restart: unless-stopped
    networks:
      - dev_network
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drift_triage}
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    command: >
      sh -c "pip install -q psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drift_triage}
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Model service ────────────────────────────────────────────────────────
  service:
    build:
      context: ./backend
      target: service
    container_name: dt_service
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
      AGENT_URL: http://agent:8001
    ports:
      - "8000:8000"
    networks:
      - dev_network
    volumes:
      - ./backend/artifacts:/app/artifacts:ro
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Agent service ────────────────────────────────────────────────────────
  agent:
    build:
      context: ./backend
      target: agent
    container_name: dt_agent
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
    ports:
      - "8001:8001"
    networks:
      - dev_network
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── arq worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      target: worker
    container_name: dt_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SERVICE_URL: http://service:8000
    networks:
      - dev_network
    volumes:
      - ./backend/artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # ─── Streamlit dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
    container_name: dt_dashboard
    restart: unless-stopped
    environment:
      SERVICE_URL: http://service:8000
      AGENT_URL: http://agent:8001
    ports:
      - "8501:8501"
    networks:
      - dev_network
    depends_on:
      service:
        condition: service_healthy
      agent:
        condition: service_healthy

networks:
  # External — shared across all projects on this machine.
  # Created automatically by make up / make up-full if it doesn't exist yet.
  dev_network:
    external: true
    name: dev_network

volumes:
  postgres_data:    # shared with ~/infra — same volume, same data
  redis_data:       # shared with ~/infra
  pgadmin_data:     # shared with ~/infra
  mlflow_data:      # project-local — MLflow artifacts
