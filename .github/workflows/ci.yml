name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.14"
      - name: Install deps
        run: uv sync
      - name: black
        run: uv run black --check src tests
      - name: isort
        run: uv run isort --check src tests
      - name: flake8
        run: uv run flake8 src tests --max-line-length 88 --extend-ignore E203,W503
      - name: mypy
        run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      VAULT_ROLE_ID: test-role
      VAULT_SECRET_ID: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.14"
      - name: Install deps
        run: uv sync
      - name: Schema tests
        run: uv run pytest tests/test_schemas.py tests/test_drift_math.py -v
      - name: Agent snapshot trajectory tests (no API key)
        run: uv run pytest tests/agent/test_trajectories.py -v
      - name: Full test suite with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
        continue-on-error: true

  fidelity:
    name: Fidelity Replay
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.14"
      - name: Install deps
        run: uv sync
      - name: Fidelity replay (skipped if model not committed)
        run: uv run pytest tests/ml/test_fidelity.py -v
        continue-on-error: true  # model artifacts not in git; passes after make train
